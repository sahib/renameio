name: Test
on:
  pull_request:
  push:
    branches:
    - master
    tags:
    - v*
jobs:
  test:
    strategy:
      matrix:
        go-version:
        - 1.24.x
        - 1.25.x
        os:
        - macos-latest
        - ubuntu-latest
        - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ matrix.go-version }}
    - name: Linux test
      if: matrix.os == 'ubuntu-latest'
      run: |
        go test -c -race .
        sudo ./renameio.test -test.v
    - name: Non-Linux test
      if: matrix.os != 'ubuntu-latest'
      run: go test .
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.25.x
      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: latest
